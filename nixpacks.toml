[phases.setup]
aptPkgs = [
  "libcairo2-dev",
  "libpango1.0-dev",
  "libjpeg-dev",
  "libgif-dev",
  "librsvg2-dev",
  "libfontconfig1",
  "fontconfig",
  "fonts-dejavu-core",
  "fonts-noto-core",
  "fonts-noto-cjk",
  "fonts-noto-color-emoji",
  "fonts-nanum"
]

[phases.install]
cmds = [
  "npm ci",
  "npx prisma generate"
]

[phases.build]
cmds = [
  "npm run build"
]

[start]
cmd = "npx prisma generate && node dist/main"
